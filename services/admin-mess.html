<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mess Management</title>
    <link rel="stylesheet" href="admin-mess.css">
</head>

<body>

    <header>
        <h1>🍽 H-9 Mess Management</h1>
    </header>

    <main>
        <div class="stats-card">

    <h3 id="totalFeedback">
        0
    </h3>

    <p>Total Feedback</p>

</div>
<br></br>


        <!-- Update Menu -->

        <section class="card">

            <h2>Update Weekly Menu</h2>

            <div class="form-group">

                <label>Day</label>

                <select id="day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>

                 </select>

            </div>

            <div class="form-group">

                <label>Breakfast</label>
                <input type="text" id="breakfast">

            </div>

            <div class="form-group">

                <label>Lunch</label>
                <input type="text" id="lunch">

            </div>

            <div class="form-group">

                <label>Dinner</label>
                <input type="text" id="dinner">

            </div>

           <button
    class="save-btn"
    onclick="saveMenu()">

    Save Menu

</button>
        </section>

        <!-- Timings -->

        <section class="card">

            <h2>Mess Timings</h2>

            <p>🍳 Breakfast : 7:30 AM - 9:00 AM</p>

            <p>🍛 Lunch : 12:30 PM - 2:00 PM</p>

            <p>🍽 Dinner : 7:30 PM - 9:00 PM</p>

        </section>

        <!-- Feedback -->

      <section class="card">

    <h2>Student Feedback</h2>

    <div id="feedbackList">

        Loading Feedback...

    </div>

</section>

    </main>
<script src="../js/admin-mess.js"></script>
</body>

</html>
