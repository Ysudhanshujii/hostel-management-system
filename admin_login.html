<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hostel Management</title>
    <link rel="stylesheet" href="admin_login.css">
</head>
<body>

    <header>
        <h1> MANIT Hostel Management System</h1>
    </header>

    <main>
      <form id="adminLoginForm">

            <fieldset>
                <legend><h2>Admin Login </h2></legend>

                <div>
                    <label for="username">Username:</label><br>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <br>
                <div>
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <br>
                <div>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember Me</label>
                </div>
                <br>
                <div>
                    <input type="submit" value="Login">
                </div>

            </fieldset>
            <p>
                <a href="admin_forget_pass.html">Forgot Password?</a>
            </p>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Hostel Management. All Rights Reserved.</p>
    </footer>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
