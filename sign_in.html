<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign-In</title>
    <link rel="stylesheet" href="sign_in.css">
</head>
<body>

    <header>
        <h1>Hostel Management Portal</h1>
    </header>
    
    <main>
       <form id="studentLoginForm">

            <fieldset>
                <legend>Student Sign-In</legend>

                <div>
                    <label for="Scholar">Scholar Number:</label>
                    <input type="text" id="Scholar" name="Scholar" placeholder="Enter your Scholar number" required>
                </div>
                
                <div>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group-inline">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember Me</label>
                </div>
                
                <div>
                    <input type="submit" value="Sign In">
                </div>
            </fieldset>
            
            <div class="form-footer">
                <a href="student_forget_pass.html">Forgot Password?</a>
                <p>Don't have an account? <a href="registration.html">Register Now</a></p>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Hostel Management. All Rights Reserved.</p>
    </footer>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
